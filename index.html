<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>❤️ Para Maribel - De Brayan</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #ff9a9e, #fad0c4);
      height: 100vh;
      overflow: hidden;
      color: white;
      text-align: center;
    }
    #game-container {
      position: relative;
      width: 100%;
      height: 100vh;
    }
    #header {
      position: absolute;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 100;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }
    #score, #time {
      font-size: 26px;
      font-weight: bold;
      text-shadow: 0 0 10px rgba(0,0,0,0.3);
    }
    .heart {
      position: absolute;
      font-size: 45px;
      cursor: pointer;
      transition: all 0.3s;
      user-select: none;
      text-shadow: 0 0 15px rgba(255, 0, 100, 0.8);
    }
    .heart:hover {
      transform: scale(1.4) rotate(15deg);
    }
    .jealous {
      text-shadow: 0 0 15px rgba(0, 190, 255, 0.8);
    }
    .jealous:hover {
      transform: scale(1.3) rotate(-12deg);
    }
    #combo-indicator {
      position: absolute;
      top: 110px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 150;
      font-size: 28px;
      font-weight: bold;
      color: #fff7ad;
      text-shadow: 0 0 14px rgba(255, 200, 0, 0.95);
      opacity: 0;
      transition: opacity 0.25s ease;
      pointer-events: none;
    }
    #start-screen, #end-screen {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.75);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 200;
    }
    button {
      margin-top: 25px;
      padding: 16px 45px;
      font-size: 24px;
      background: #ff4d94;
      color: white;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      box-shadow: 0 6px 20px rgba(255, 77, 148, 0.5);
      transition: all 0.3s;
    }
    button:hover {
      background: #ff1a7a;
      transform: scale(1.08);
    }
    h1 { font-size: 52px; margin-bottom: 15px; }
    p { font-size: 26px; max-width: 85%; line-height: 1.4; }
    .dedication {
      font-size: 28px;
      margin-top: 20px;
      color: #ffe6f0;
    }
    .small-note {
      font-size: 20px;
      max-width: 88%;
      margin-top: 14px;
      color: #ffe6f0;
    }
  </style>
</head>
<body>
  <div id="game-container">
    <div id="header">
      <div id="score">Puntos: <span id="points">0</span></div>
      <div id="score">Corazones: <span id="caught">0</span>/<span id="target">40</span></div>
      <div id="time">Tiempo: <span id="timer">60</span>s</div>
      <div id="combo-indicator">BESO x2 ACTIVADO</div>
    </div>

    <!-- Pantalla de inicio -->
    <div id="start-screen">
      <h1>❤️ Maribel ❤️</h1>
      <p>Mi amor, ¿puedes atrapar todos mis corazones antes de que se acabe el tiempo?</p>
      <p class="dedication">Hecho con todo mi amor por Brayan</p>
      <button onclick="startGame()">¡Empezar el juego, mi vida!</button>
    </div>

    <!-- Pantalla de fin -->
    <div id="end-screen" style="display: none;">
      <h1 id="end-title">¡Se acabó el tiempo!</h1>
      <p id="end-message" style="font-size: 32px; margin: 20px 0;"></p>
      <p id="secret-message" class="small-note" style="display: none;"></p>
      <p id="excuse-text" class="small-note" style="display: none;"></p>
      <p class="dedication">Te amo Maribel, eres lo mejor de mi vida ❤️</p>
      <button id="restart-btn" onclick="restartGame()">Jugar de nuevo</button>
      <button id="excuse-btn" onclick="showExcuse()" style="display: none;">Perdóname amor, me puse nerviosa 😅</button>
      <button id="hug-btn" onclick="giveHug()" style="display: none;">Dar abrazo 🤗 (0/3)</button>
    </div>
  </div>

  <script>
    let score = 0;
    let timeLeft = 60;
    let timerInterval;
    let heartInterval;
    let jealousyInterval;
    let isPlaying = false;
    let heartsCaught = 0;
    let streak = 0;
    let comboActive = false;
    let comboTimeout;
    let hugCount = 0;
    let needsHugs = false;
    const targetHearts = 40;

    function spawnFloatingMessage(x, y, text, shadowColor = '#ff4d94') {
      const msg = document.createElement('div');
      msg.style.position = 'absolute';
      msg.style.left = x;
      msg.style.top = y;
      msg.style.fontSize = '20px';
      msg.style.color = '#fff';
      msg.style.fontWeight = 'bold';
      msg.style.textShadow = `0 0 12px ${shadowColor}`;
      msg.style.opacity = '1';
      msg.style.transition = 'all 1.8s ease-out';
      msg.textContent = text;

      document.getElementById('game-container').appendChild(msg);

      setTimeout(() => {
        msg.style.opacity = '0';
        msg.style.transform = 'translateY(-120px)';
      }, 100);

      setTimeout(() => msg.remove(), 2000);
    }

    function activateKissCombo() {
      comboActive = true;
      clearTimeout(comboTimeout);

      const combo = document.getElementById('combo-indicator');
      combo.style.opacity = '1';

      comboTimeout = setTimeout(() => {
        comboActive = false;
        combo.style.opacity = '0';
      }, 3000);
    }

    function createJealousFace() {
      if (!isPlaying) return;

      const jealous = document.createElement('div');
      jealous.classList.add('heart', 'jealous');
      jealous.textContent = '😒';

      const x = Math.random() * (window.innerWidth - 80);
      jealous.style.left = x + 'px';
      jealous.style.top = '-80px';

      const duration = Math.random() * 1.4 + 2.8;
      jealous.style.transition = `top ${duration}s linear`;

      document.getElementById('game-container').appendChild(jealous);

      setTimeout(() => {
        jealous.style.top = window.innerHeight + 'px';
      }, 100);

      jealous.addEventListener('click', () => {
        if (!isPlaying) return;

        timeLeft = Math.max(timeLeft - 6, 0);
        document.getElementById('timer').textContent = timeLeft;
        streak = 0;

        spawnFloatingMessage(jealous.style.left, '35%', '-6s por celos 😵', '#5ad1ff');
        jealous.remove();

        if (timeLeft <= 0) {
          endGame();
        }
      });

      setTimeout(() => {
        if (jealous.parentNode) jealous.remove();
      }, duration * 1000 + 500);
    }

    function showExcuse() {
      const excuse = document.getElementById('excuse-text');
      const excuses = [
        'Perdóname amor, me puse nerviosa 😅',
        'La pantalla estaba muy bonita y me distraje 😳',
        'Juro que sí te quiero, solo fallé la puntería 🙈',
        'Mi corazón iba rápido, mis dedos no tanto 💓'
      ];

      excuse.textContent = excuses[Math.floor(Math.random() * excuses.length)];
      excuse.style.display = 'block';
    }

    function giveHug() {
      if (!needsHugs) return;

      hugCount = Math.min(hugCount + 1, 3);
      const hugBtn = document.getElementById('hug-btn');
      hugBtn.textContent = `Dar abrazo 🤗 (${hugCount}/3)`;

      if (hugCount >= 3) {
        needsHugs = false;
        document.getElementById('restart-btn').style.display = 'inline-block';
        hugBtn.style.display = 'none';
      }
    }

    function createHeart() {
      if (!isPlaying) return;

      const heart = document.createElement('div');
      heart.classList.add('heart');
      const isBrokenHeart = Math.random() < 0.18;
      const heartData = isBrokenHeart
        ? { symbol: '💔', points: -12, good: false }
        : { symbol: ['❤️', '💖', '💗', '💓'][Math.floor(Math.random()*4)], points: 10, good: true };

      heart.textContent = heartData.symbol;

      const x = Math.random() * (window.innerWidth - 80);
      heart.style.left = x + 'px';
      heart.style.top = window.innerHeight + 'px';

      const duration = Math.random() * 2 + 2.2; // 2.2 a 4.2 segundos (modo dificil)

      heart.style.transition = `top ${duration}s linear`;

      document.getElementById('game-container').appendChild(heart);

      setTimeout(() => {
        heart.style.top = '-80px';
      }, 100);

      heart.addEventListener('click', () => {
        if (!isPlaying) return;

        const pointsToAdd = (heartData.good && comboActive) ? heartData.points * 2 : heartData.points;
        score += pointsToAdd;
        if (score < 0) score = 0;
        if (heartData.good) {
          heartsCaught++;
          streak++;
          if (streak === 5) {
            activateKissCombo();
          }
        } else {
          streak = 0;
        }

        document.getElementById('points').textContent = score;
        document.getElementById('caught').textContent = heartsCaught;

        const heartMessage = heartData.good
          ? [
              "¡Te amo Maribel!",
              "Eres mi todo 💕",
              "Mi princesa ❤️",
              "Contigo soy feliz",
              comboActive ? "BESO x2 activado 😘" : "Para siempre tuya"
            ][Math.floor(Math.random()*5)]
          : [
              "¡Ay no! corazón tóxico 😵",
              "Ese no valía, mi vida 💔",
              "Ups, ese restaba puntos 🙈"
            ][Math.floor(Math.random()*3)];

        spawnFloatingMessage(
          heart.style.left,
          (parseFloat(heart.style.top) || 300) + 'px',
          heartMessage,
          heartData.good ? '#ff4d94' : '#ff8ca8'
        );

        heart.remove();
      });

      // Eliminar corazón si no lo atrapan
      setTimeout(() => {
        if (heart.parentNode) heart.remove();
      }, duration * 1000 + 600);
    }

    function startTimer() {
      timerInterval = setInterval(() => {
        timeLeft--;
        document.getElementById('timer').textContent = timeLeft;

        if (timeLeft <= 10) {
          document.getElementById('timer').style.color = '#ff0000';
        }

        if (timeLeft <= 0) {
          endGame();
        }
      }, 1000);
    }

    function startGame() {
      document.getElementById('start-screen').style.display = 'none';
      
      score = 0;
      timeLeft = 60;
      heartsCaught = 0;
      streak = 0;
      comboActive = false;
      hugCount = 0;
      needsHugs = false;
      isPlaying = true;

      document.getElementById('points').textContent = '0';
      document.getElementById('caught').textContent = '0';
      document.getElementById('target').textContent = targetHearts;
      document.getElementById('timer').textContent = '60';
      document.getElementById('timer').style.color = 'white';
      document.getElementById('combo-indicator').style.opacity = '0';
      document.getElementById('secret-message').style.display = 'none';
      document.getElementById('excuse-text').style.display = 'none';
      document.getElementById('excuse-btn').style.display = 'none';
      document.getElementById('hug-btn').style.display = 'none';
      document.getElementById('restart-btn').style.display = 'inline-block';

      // Modo dificil: corazones rapidos y menos "limpios"
      heartInterval = setInterval(() => {
        if (Math.random() > 0.32) createHeart();
        if (Math.random() > 0.72) createHeart();
      }, 280);

      jealousyInterval = setInterval(() => {
        createJealousFace();
      }, 10000);

      startTimer();
    }

    function endGame() {
      isPlaying = false;
      clearInterval(timerInterval);
      clearInterval(heartInterval);
      clearInterval(jealousInterval);
      clearTimeout(comboTimeout);

      // Limpiar corazones restantes
      document.querySelectorAll('.heart').forEach(h => h.remove());

      const endScreen = document.getElementById('end-screen');
      const endTitle = document.getElementById('end-title');
      const endMessage = document.getElementById('end-message');
      const secretMessage = document.getElementById('secret-message');
      const excuseBtn = document.getElementById('excuse-btn');
      const restartBtn = document.getElementById('restart-btn');
      const hugBtn = document.getElementById('hug-btn');
      const heartsLeft = Math.max(targetHearts - heartsCaught, 0);

      if (heartsCaught >= targetHearts + 20) {
        endTitle.textContent = "¡Me quieres DEMASIADO! 😍";
        endMessage.innerHTML = `Atrapaste <strong>${heartsCaught}</strong> corazones (meta: ${targetHearts})<br><strong>${score}</strong> puntos<br>Confirmado: soy tu persona favorita`;
        secretMessage.innerHTML = '🎁 Premio secreto desbloqueado: tienes un deseo.';
        secretMessage.style.display = 'block';
      } else if (heartsCaught >= targetHearts) {
        endTitle.textContent = "¡Sí me quieres mucho! ❤️";
        endMessage.innerHTML = `Atrapaste <strong>${heartsCaught}</strong> corazones y cumpliste la meta<br><strong>${score}</strong> puntos<br>Nivel amor desbloqueado`;
      } else if (heartsCaught >= targetHearts * 0.7) {
        endTitle.textContent = "Me quieres... pero te distraes 😅";
        endMessage.innerHTML = `Te faltaron <strong>${heartsLeft}</strong> corazones para la meta de ${targetHearts}<br><strong>${score}</strong> puntos<br>Te doy otra oportunidad, mi vida`;
        excuseBtn.style.display = 'inline-block';
      } else {
        endTitle.textContent = "Mmm... no me quieres mucho 😭";
        endMessage.innerHTML = `Solo atrapaste <strong>${heartsCaught}</strong> de ${targetHearts} corazones<br><strong>${score}</strong> puntos<br>Necesito mimos y revancha ya`;
        excuseBtn.style.display = 'inline-block';

        if (heartsCaught < targetHearts * 0.5) {
          needsHugs = true;
          restartBtn.style.display = 'none';
          hugBtn.style.display = 'inline-block';
          hugBtn.textContent = 'Dar abrazo 🤗 (0/3)';
        }
      }

      endScreen.style.display = 'flex';
    }

    function restartGame() {
      if (needsHugs && hugCount < 3) return;
      document.getElementById('end-screen').style.display = 'none';
      startGame();
    }

    // Doble clic para corazón extra durante el juego
    document.addEventListener('dblclick', (e) => {
      if (isPlaying && e.target.id !== 'end-screen') {
        createHeart();
      }
    });

    console.log("%c❤️ Juego dedicado a Maribel por Brayan ❤️", "color:#ff4d94; font-size:18px");
  </script>
</body>
</html>
